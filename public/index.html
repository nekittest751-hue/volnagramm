<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volnagramm</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">Volnagramm</div>
      <div class="auth-subtitle">Вход или регистрация</div>

      <input id="username" type="text" placeholder="username" />
      <input id="displayName" type="text" placeholder="display name (для регистрации)" />
      <input id="password" type="password" placeholder="password" />

      <div class="auth-actions">
        <button id="loginBtn">Войти</button>
        <button id="registerBtn" class="secondary">Регистрация</button>
      </div>

      <div class="demo-note">Демо: ocean / volna123</div>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <div id="appScreen" class="app-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-wrap">
          <div class="brand-title">Volnagramm</div>
          <div class="brand-subtitle">secure messenger</div>
        </div>
        <div id="globalStatus" class="global-status">Подключение...</div>
      </div>

      <div id="meBox" class="me-box hidden"></div>

      <div class="sidebar-block">
        <div class="block-title">Поиск пользователей</div>
        <input id="userSearch" type="text" placeholder="найти пользователя" />
        <div id="userResults" class="user-results"></div>
      </div>

      <div class="sidebar-block">
        <div class="block-title">Создать группу</div>
        <input id="groupTitle" type="text" placeholder="название группы" />
        <input id="groupMembers" type="text" placeholder="id участников через запятую" />
        <button id="createGroupBtn">Создать группу</button>
      </div>

      <div class="sidebar-block chats-block">
        <div class="block-title">Чаты</div>
        <div id="chatsList" class="chat-list"></div>
      </div>

      <div class="sidebar-bottom">
        <button id="logoutBtn" class="danger">Выйти</button>
      </div>
    </aside>

    <main class="chat-screen">
      <div class="chat-header">
        <div class="chat-userbox">
          <div id="chatAvatar" class="chat-avatar">V</div>
          <div class="chat-head-meta">
            <div id="activeChatTitle" class="chat-title">Выбери чат</div>
            <div id="activeChatSubtitle" class="chat-subtitle">Сообщения будут здесь</div>
          </div>
        </div>

        <div class="chat-header-actions">
          <button id="audioCallBtn" class="icon-btn hidden" title="Аудиозвонок">📞</button>
          <button id="videoCallBtn" class="icon-btn hidden" title="Видеозвонок">🎥</button>
        </div>
      </div>

      <div id="messages" class="messages">
        <div class="empty-chat">Открой чат слева или найди пользователя.</div>
      </div>

      <div class="chat-composer">
        <label for="fileInput" class="attach-btn">📎</label>
        <input id="fileInput" type="file" class="hidden" />
        <input id="messageInput" type="text" placeholder="Написать сообщение..." />
        <button id="sendBtn">Отправить</button>
      </div>
    </main>
  </div>

  <div id="callModal" class="call-modal hidden">
    <div class="call-card">
      <div id="callTitle" class="call-title">Звонок</div>
      <div id="callStatus" class="call-status">Подключение...</div>

      <div class="call-actions">
        <button id="acceptCallBtn">Принять</button>
        <button id="rejectCallBtn" class="danger">Сбросить</button>
      </div>

      <video id="remoteVideo" autoplay playsinline class="call-video hidden"></video>
      <video id="localVideo" autoplay muted playsinline class="call-video small hidden"></video>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
