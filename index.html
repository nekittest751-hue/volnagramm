<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volnagramm</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">V</div>
        <div>
          <h1>Volnagramm</h1>
          <p>чат без ws</p>
        </div>
      </div>

      <div id="authBox" class="panel">
        <h2>Вход / Регистрация</h2>
        <input id="username" placeholder="username" />
        <input id="displayName" placeholder="display name (для регистрации)" />
        <input id="password" type="password" placeholder="password" />
        <div class="row">
          <button id="loginBtn">Войти</button>
          <button id="registerBtn" class="secondary">Регистрация</button>
        </div>
        <small>Демо: ocean / volna123</small>
      </div>

      <div id="userBox" class="panel hidden">
        <div class="meRow">
          <div>
            <strong id="meName"></strong>
            <div id="meUsername" class="muted"></div>
          </div>
          <button id="logoutBtn" class="secondary">Выйти</button>
        </div>
      </div>

      <div id="searchBox" class="panel hidden">
        <h3>Поиск пользователей</h3>
        <input id="searchInput" placeholder="найти пользователя" />
        <div id="searchResults" class="list"></div>
      </div>

      <div id="groupBox" class="panel hidden">
        <h3>Группа</h3>
        <input id="groupTitle" placeholder="название группы" />
        <input id="groupMemberIds" placeholder="id участников через запятую" />
        <button id="createGroupBtn">Создать группу</button>
      </div>

      <div class="panel hidden" id="chatsPanel">
        <h3>Чаты</h3>
        <div id="chatList" class="list"></div>
      </div>
    </aside>

    <main class="chatArea">
      <div id="chatHeader" class="chatHeader">Выбери чат</div>
      <div id="messages" class="messages"></div>
      <form id="messageForm" class="composer hidden">
        <input id="messageInput" placeholder="Напиши сообщение" autocomplete="off" />
        <button>Отправить</button>
      </form>
    </main>
  </div>
  <script src="/script.js"></script>
</body>
</html>
